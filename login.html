<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Auction Orbit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?q=80&w=2067&auto=format&fit=crop') center/cover;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: #000;
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.3);
        }

        .login-box h2 {
            font-size: 24px;
            color: #fff;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .login-box p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 38px;
            color: var(--text-muted);
            font-size: 16px;
        }

        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 15px 14px 45px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: #f59e0b;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.4);
        }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body style="margin:0; padding:0;">
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <i class="fa fa-rocket"></i>
            </div>
            <h2>Auction Orbit</h2>
            <p>Sign in to manage your premium auction</p>

            <form id="loginForm">
                <div class="input-group">
                    <label>Admin Email</label>
                    <i class="fa fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email address..." required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <i class="fa fa-lock"></i>
                    <input type="password" id="password" placeholder="Password..." required>
                </div>
                
                <button type="submit" class="login-btn">Login to Dashboard</button>
                <div id="errorMsg" class="error-msg">Incorrect credentials. Please try again.</div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // ─── Firebase Config (Using your project's new config) ──────────────
        const firebaseConfig = {
            apiKey: "AIzaSyBNTPXhzfkEALQ8s-1KnEiAudTz_ILRqgo",
            authDomain: "auction-orbit.firebaseapp.com",
            databaseURL: "https://auction-orbit-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "auction-orbit",
            storageBucket: "auction-orbit.firebasestorage.app",
            messagingSenderId: "464587475140",
            appId: "1:464587475140:web:5c32d7803fdeafc478e191",
            measurementId: "G-B9LFEQ71ZX"
        };
        firebase.initializeApp(firebaseConfig);

        // ─── Branded Custom Alert & Confirm ─────────────────────────────
        window.alert = function(message) {
            return showCustomModal(message, false);
        };
        window.confirm = function(message) {
            return showCustomModal(message, true);
        };

        function showCustomModal(message, isConfirm) {
            const overlay = document.createElement('div');
            overlay.className = 'custom-alert-overlay';
            overlay.innerHTML = `
                <div class="custom-alert-box">
                    <span class="custom-alert-title">Auction Orbit says</span>
                    <p class="custom-alert-msg">${message}</p>
                    <div class="custom-alert-btns">
                        ${isConfirm ? '<button class="custom-alert-btn cancel">Cancel</button>' : ''}
                        <button class="custom-alert-btn">OK</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            setTimeout(() => overlay.classList.add('show'), 10);
            
            return new Promise(resolve => {
                const btns = overlay.querySelectorAll('button');
                btns.forEach(btn => {
                    btn.onclick = () => {
                        const isOk = btn.innerText === "OK";
                        overlay.classList.remove('show');
                        setTimeout(() => {
                            document.body.removeChild(overlay);
                            resolve(isConfirm ? isOk : true);
                        }, 200);
                    };
                });
            });
        }

        document.getElementById("loginForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const error = document.getElementById("errorMsg");
            const loginBtn = e.target.querySelector('button');

            loginBtn.innerText = "Signing in...";
            loginBtn.disabled = true;

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Login successful
                    window.location.href = "admin.html";
                })
                .catch((err) => {
                    // Error handle
                    console.error("Auth Error:", err);
                    
                    let friendlyMsg = "Incorrect email or password. Please try again.";
                    
                    // Map common Firebase error codes to user-friendly messages
                    if (err.code === "auth/invalid-email") {
                        friendlyMsg = "Invalid email format. Please check and try again.";
                    } else if (err.code === "auth/user-not-found" || err.code === "auth/wrong-password" || (err.message && err.message.includes("INVALID_LOGIN_CREDENTIALS"))) {
                        friendlyMsg = "Incorrect email or password.";
                    } else if (err.code === "auth/too-many-requests") {
                        friendlyMsg = "Too many failed attempts. Please try again later.";
                    } else if (err.code === "auth/network-request-failed") {
                        friendlyMsg = "Network error. Please check your internet connection.";
                    }
                    
                    error.innerText = friendlyMsg;
                    error.style.display = "block";
                    loginBtn.innerText = "Login to Dashboard";
                    loginBtn.disabled = false;
                    
                    // Auto-hide after 5 seconds
                    setTimeout(() => { 
                        error.style.display = "none"; 
                    }, 5000);
                });
        });

        // If already logged in, redirect to admin
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                window.location.href = "admin.html";
            }
        });
    </script>
</body>
</html>
