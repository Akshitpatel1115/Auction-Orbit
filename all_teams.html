<!DOCTYPE html>
<html lang="en">
<head>
    <title>Team Rosters | Auction Orbit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View all teams and their bought players with sold prices.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.1">
    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        .team-section {
            background: rgba(28, 32, 40, 0.85); /* Slightly glowing sports card */
            box-shadow: 0 4px 14px rgba(0,0,0,0.4);
            border-radius: var(--radius);
            margin-bottom: 24px;
            overflow: hidden;
        }
        .team-header {
            padding: 16px 40px 16px 20px;
            background: rgba(15, 19, 28, 0.9);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            cursor: pointer;
            position: relative;
            transition: background 0.2s ease;
        }
        .team-header:hover {
            background: rgba(25, 29, 38, 0.95);
        }
        .team-header::after {
            content: '▼';
            position: absolute;
            right: 20px;
            color: var(--muted);
            font-size: 14px;
            transition: transform 0.3s ease;
        }
        .team-section.expanded .team-header::after {
            transform: rotate(180deg);
        }
        .team-header img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
        }
        .team-header-info {
            flex: 1;
            min-width: 200px;
        }
        .team-header-info h2 {
            font-family: 'Manrope', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
        }
        .team-stats {
            display: flex;
            gap: 15px;
            font-size: 11px;
            color: var(--muted);
            flex-wrap: wrap;
        }
        .team-stats span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .team-stats strong {
            color: var(--gold);
            font-size: 13px;
        }
        .team-players {
            padding: 20px;
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 16px;
            animation: slideDown 0.3s ease;
        }
        .team-section.expanded .team-players {
            display: grid;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .empty-team {
            padding: 30px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            width: 100%;
        }
    </style>
</head>
<body class="roster-body">

    <div class="top-bar" style="justify-content: flex-start; gap: 20px;">
        <a href="index.html" class="nav-btn">🏏 View Auction</a>
        <h1 class="top-bar-title">TEAM ROSTERS</h1>
    </div>

    <div class="roster-main">
        <div id="teamsContainer">
            <!-- Teams will render here -->
        </div>
    </div>

    <script>
        // ─── Firebase ──────────────────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyBNTPXhzfkEALQ8s-1KnEiAudTz_ILRqgo",
            authDomain: "auction-orbit.firebaseapp.com",
            databaseURL: "https://auction-orbit-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "auction-orbit",
            storageBucket: "auction-orbit.firebasestorage.app",
            messagingSenderId: "464587475140",
            appId: "1:464587475140:web:5c32d7803fdeafc478e191",
            measurementId: "G-B9LFEQ71ZX"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // FIX: BUG-12 — HTML sanitizer to prevent XSS from user-supplied data
        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // ─── Branded Custom Alert & Confirm ─────────────────────────────
        window.alert = function(message) {
            return showCustomModal(message, false);
        };
        window.confirm = function(message) {
            return showCustomModal(message, true);
        };

        // FIX: BUG-20 — Use textContent for message to prevent XSS in modals
        function showCustomModal(message, isConfirm) {
            const overlay = document.createElement('div');
            overlay.className = 'custom-alert-overlay';
            const box = document.createElement('div');
            box.className = 'custom-alert-box';
            const title = document.createElement('span');
            title.className = 'custom-alert-title';
            title.textContent = 'Auction Orbit says';
            const msg = document.createElement('p');
            msg.className = 'custom-alert-msg';
            msg.textContent = message;
            const btnsDiv = document.createElement('div');
            btnsDiv.className = 'custom-alert-btns';
            if (isConfirm) {
                const cancelBtn = document.createElement('button');
                cancelBtn.className = 'custom-alert-btn cancel';
                cancelBtn.textContent = 'Cancel';
                btnsDiv.appendChild(cancelBtn);
            }
            const okBtn = document.createElement('button');
            okBtn.className = 'custom-alert-btn';
            okBtn.textContent = 'OK';
            btnsDiv.appendChild(okBtn);
            box.appendChild(title);
            box.appendChild(msg);
            box.appendChild(btnsDiv);
            overlay.appendChild(box);
            document.body.appendChild(overlay);
            setTimeout(() => overlay.classList.add('show'), 10);
            
            return new Promise(resolve => {
                const btns = overlay.querySelectorAll('button');
                btns.forEach(btn => {
                    btn.onclick = () => {
                        const isOk = btn.innerText === "OK";
                        overlay.classList.remove('show');
                        setTimeout(() => {
                            document.body.removeChild(overlay);
                            resolve(isConfirm ? isOk : true);
                        }, 200);
                    };
                });
            });
        }

        let teamsData = {};

        function renderTeams() {
            const container = document.getElementById("teamsContainer");
            if (Object.keys(teamsData).length === 0) {
                container.innerHTML = '<div class="empty-team">No teams initialized yet.</div>';
                return;
            }

            container.innerHTML = Object.entries(teamsData)
                .map(([teamId, team]) => ({ id: teamId, ...team }))
                .sort((a, b) => a.name.localeCompare(b.name))
                .map((team) => {
                    const teamId = team.id;
                    const buys = Object.values(team.buys || {});
                
                let playersHtml = "";
                if (buys.length === 0) {
                    playersHtml = '<div class="empty-team">No players bought yet.</div>';
                } else {
                    playersHtml = buys.map(p => `
                        <div class="player-card roster-card">
                            <img src="${esc(p.photo || 'https://via.placeholder.com/110x90')}" alt="${esc(p.name)}">
                            <div class="player-card-body">
                                <strong>${esc(p.name)}</strong>
                                <div style="font-size:9px; color:var(--muted); margin:2px 0;">${esc(p.role)}${p.city ? ' | '+esc(p.city) : ''}</div>
                                <div style="font-size:12px; font-weight:800; color:var(--gold); margin-top:4px;">₹ ${(p.price||0).toLocaleString('en-IN')}</div>
                            </div>
                        </div>
                    `).join('');
                }

                return `
                <div class="team-section" id="team-${esc(teamId)}">
                    <div class="team-header" onclick="toggleTeam('${esc(teamId)}')">
                        <img src="${esc(team.logo || 'https://via.placeholder.com/50')}" alt="${esc(team.name)}" onerror="this.src='https://via.placeholder.com/50'">
                        <div class="team-header-info">
                            <h2>${esc(team.name)}</h2>
                            <div class="team-stats">
                                <span>Players Bought: <strong>${team.players || 0}</strong></span>
                                <span>Purse Remaining: <strong>₹ ${(team.purse || 0).toLocaleString('en-IN')}</strong></span>
                            </div>
                        </div>
                    </div>
                    <div class="team-players">
                        ${playersHtml}
                    </div>
                </div>
                `;
            }).join('');
        }

        async function initData() {
            db.ref("teams").on("value", snap => {
                teamsData = snap.val() || {};
                renderTeams();
            });
        }

        function toggleTeam(teamId) {
            const el = document.getElementById('team-' + teamId);
            if (el) {
                el.classList.toggle('expanded');
            }
        }

        initData();
    </script>
</body>
</html>
