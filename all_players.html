<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Players | Auction Orbit</title>
    <link rel="stylesheet" href="style.css?v=1.1">
    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="roster-body">

    <div class="top-bar" style="justify-content: flex-start; gap: 20px;">
        <a href="index.html" class="nav-btn">🔙 View Auction</a>
        <h1 class="top-bar-title">PLAYER ROSTER DASHBOARD</h1>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('available', this)">Available Players (<span id="count-avail">0</span>)</button>
        <button class="tab-btn" onclick="switchTab('sold', this)">Sold Players (<span id="count-sold">0</span>)</button>
        <button class="tab-btn" onclick="switchTab('unsold', this)">Unsold Players (<span id="count-unsold">0</span>)</button>
    </div>

    <div class="roster-main">
        <!-- AVAILABLE -->
        <div id="tab-available" class="tab-content active">
            <div id="grid-available" class="roster-grid"></div>
        </div>

        <!-- SOLD -->
        <div id="tab-sold" class="tab-content">
            <div id="grid-sold" class="roster-grid"></div>
        </div>

        <!-- UNSOLD -->
        <div id="tab-unsold" class="tab-content">
            <div id="grid-unsold" class="roster-grid"></div>
        </div>
    </div>

    <script>
        // ─── Firebase Configuration ───────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyBNTPXhzfkEALQ8s-1KnEiAudTz_ILRqgo",
            authDomain: "auction-orbit.firebaseapp.com",
            databaseURL: "https://auction-orbit-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "auction-orbit",
            storageBucket: "auction-orbit.firebasestorage.app",
            messagingSenderId: "464587475140",
            appId: "1:464587475140:web:5c32d7803fdeafc478e191",
            measurementId: "G-B9LFEQ71ZX"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ─── Branded Custom Alert & Confirm ─────────────────────────────
        window.alert = function(message) {
            return showCustomModal(message, false);
        };
        window.confirm = function(message) {
            return showCustomModal(message, true);
        };

        function showCustomModal(message, isConfirm) {
            const overlay = document.createElement('div');
            overlay.className = 'custom-alert-overlay';
            overlay.innerHTML = `
                <div class="custom-alert-box">
                    <span class="custom-alert-title">Auction Orbit says</span>
                    <p class="custom-alert-msg">${message}</p>
                    <div class="custom-alert-btns">
                        ${isConfirm ? '<button class="custom-alert-btn cancel">Cancel</button>' : ''}
                        <button class="custom-alert-btn">OK</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            setTimeout(() => overlay.classList.add('show'), 10);
            
            return new Promise(resolve => {
                const btns = overlay.querySelectorAll('button');
                btns.forEach(btn => {
                    btn.onclick = () => {
                        const isOk = btn.innerText === "OK";
                        overlay.classList.remove('show');
                        setTimeout(() => {
                            document.body.removeChild(overlay);
                            resolve(isConfirm ? isOk : true);
                        }, 200);
                    };
                });
            });
        }

        let allPlayers = [];
        let soldPlayers = {};
        let unsoldPlayers = {};

        // ─── Tab Switching ──────────────────────────────
        function switchTab(tabId, btnTarget) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            btnTarget.classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        // ─── Render Functions ──────────────────────────
        function renderAll() {
             // Helper to sort by name
             const sortByName = (a, b) => (a.name || "").localeCompare(b.name || "");

             // 1. Render Sold
             const soldList = Object.values(soldPlayers).sort(sortByName);
             document.getElementById("count-sold").innerText = soldList.length;
             document.getElementById("grid-sold").innerHTML = soldList.map(p => {
                 const rawP = allPlayers.find(x => x.id === p.id) || {};
                 const city = p.city || rawP.city || '';
                 const bat = p.bat || rawP.bat || 'N/A';
                 const bowl = p.bowl || rawP.bowl || '';

                 return `
                 <div class="player-card roster-card">
                     <img src="${p.photo || 'https://via.placeholder.com/110x90'}" alt="${p.name}">
                     <div class="player-card-body">
                         <strong>${p.name}</strong>
                         <div style="font-size:9px; color:var(--muted); margin:2px 0;">${p.role}${city ? ' | '+city : ''}</div>
                         <div class="pc-stats" style="margin:4px 0;">
                            <span>🏏 ${bat}</span>
                            ${bowl && bowl !== '-' ? `<span>🥎 ${bowl}</span>` : ''}
                         </div>
                         <div style="font-size:10px; font-weight:700; color:var(--gold); margin-top:4px;">₹ ${(p.price||0).toLocaleString('en-IN')}</div>
                         <div style="font-size:10px; color:#22c55e; margin-top:2px;">Sold to ${p.team}</div>
                     </div>
                 </div>
             `}).join('');

             // 2. Render Unsold
             const unsoldList = Object.values(unsoldPlayers).sort(sortByName);
             document.getElementById("count-unsold").innerText = unsoldList.length;
             document.getElementById("grid-unsold").innerHTML = unsoldList.map(p => {
                 const rawP = allPlayers.find(x => x.id === p.id) || {};
                 const city = p.city || rawP.city || '';
                 const bat = p.bat || rawP.bat || 'N/A';
                 const bowl = p.bowl || rawP.bowl || '';

                 return `
                 <div class="player-card roster-card">
                     <img src="${p.photo || rawP.photo || 'https://via.placeholder.com/110x90'}" alt="${p.name}">
                     <div class="player-card-body">
                         <strong>${p.name}</strong>
                         <div style="font-size:9px; color:var(--muted); margin:2px 0;">${p.role}${city ? ' | '+city : ''}</div>
                         <div class="pc-stats" style="margin:4px 0;">
                            <span>🏏 ${bat}</span>
                            ${bowl && bowl !== '-' ? `<span>🥎 ${bowl}</span>` : ''}
                         </div>
                         <div style="font-size:10px; font-weight:700; color:#ef4444; margin-top:4px;">❌ UNSOLD</div>
                     </div>
                 </div>
             `}).join('');

             // 3. Render Available
             const availableList = allPlayers.filter(p => !soldPlayers[p.id] && !unsoldPlayers[p.id]).sort(sortByName);
             document.getElementById("count-avail").innerText = availableList.length;
             document.getElementById("grid-available").innerHTML = availableList.map(p => `
                 <div class="player-card roster-card">
                     <img src="${p.photo || 'https://via.placeholder.com/110x90'}" alt="${p.name}">
                     <div class="player-card-body">
                         <strong>${p.name}</strong>
                         <div style="font-size:9px; color:var(--muted); margin:2px 0;">${p.role}${p.city ? ' | '+p.city : ''}</div>
                         <div class="pc-stats" style="margin:4px 0;">
                            <span>🏏 ${p.bat || 'N/A'}</span>
                            ${p.bowl && p.bowl !== '-' ? `<span>🥎 ${p.bowl}</span>` : ''}
                         </div>
                         <div style="font-size:10px; font-weight:700; color:var(--text); margin-top:4px;">Base: ₹ ${(p.price||0).toLocaleString('en-IN')}</div>
                     </div>
                 </div>
             `).join('');
        }

        // ─── Initialize Data ───────────────────────────
        async function initData() {
            const snap = await db.ref("auctionOrder").once("value");
            if (snap.exists()) {
                allPlayers = Object.values(snap.val());
            } else {
                const res = await fetch("players.json");
                allPlayers = await res.json();
            }
            renderAll();

            db.ref("soldPlayers").on("value", snap => {
                const data = snap.val() || {};
                soldPlayers = {};
                Object.values(data).forEach(p => { soldPlayers[p.id] = p; });
                renderAll();
            });

            db.ref("unsoldPlayers").on("value", snap => {
                const data = snap.val() || {};
                unsoldPlayers = {};
                Object.values(data).forEach(p => { unsoldPlayers[p.id] = p; });
                renderAll();
            });
        }

        initData();
    </script>
</body>
</html>
