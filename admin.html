<!DOCTYPE html>
<html lang="en">

<head>
    <title>Admin Panel – Auction Orbit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin control panel for the Auction Orbit system.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=1.1">
    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>

<body class="admin-body">

    <!-- HEADER -->
    <div class="admin-header">
        <div class="header-content">
            <h1>Admin Panel</h1>
            <p>Auction Orbit Control</p>
        </div>
        <button onclick="logout()" class="action-btn logout-btn">
            <i class="fa fa-sign-out"></i> Logout
        </button>
    </div>

    <div class="admin-grid">
        
        <!-- Auction Master Controls -->
        <div class="section-card full-width" style="background: rgba(245, 158, 11, 0.05); border-color: rgba(245, 158, 11, 0.2);">
            <div class="section-label"><i class="fa fa-gauge-high"></i> Auction Master Controls</div>
            <div class="action-buttons" style="grid-template-columns: 1fr 1fr;">
                <button id="masterStartBtn" class="action-btn" style="background: #f59e0b; color: #000; border: none; flex-direction: row; gap: 10px; height: 50px;" onclick="toggleAuctionStart()">
                    <i class="fa fa-play"></i> <span>Start Auction</span>
                </button>
                <button class="action-btn" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; flex-direction: row; gap: 10px; height: 50px;" onclick="restartSameOrder()">
                    <i class="fa fa-arrow-rotate-left"></i> <span>Restart Auction</span>
                </button>
            </div>
        </div>

        <!-- Current Player + Bid -->
        <div class="section-card full-width" style="position: relative; overflow: hidden;">
            <!-- SOLD/UNSOLD overlay -->
            <div id="sold">
                <div id="resultText"></div>
            </div>
            <div class="section-label" style="display:flex; justify-content:space-between; align-items:center;">
                <span><i class="fa fa-user"></i> Current Player &amp; Bid</span>
                <span class="remaining-badge">Remaining: <span id="remainingCount">0</span></span>
            </div>
            <div class="player-display">
                <div class="player-display-avatar" id="adminAvatarContainer">
                    <img id="adminPlayerPhoto" src="" alt="Player" style="display:none; width:100%; height:100%; border-radius:50%; object-fit:cover;">
                    <span id="adminEmojiPlaceholder">🏏</span>
                </div>
                <div class="player-display-info">
                    <div id="currentPlayerName" style="font-weight:700;">Player: –</div>
                    <div style="font-size:11px; color:var(--text-muted); margin-top:2px;">Awaiting next player...</div>
                </div>
                <div class="bid-display-wrap">
                    <div class="bid-label-sm">Current Bid</div>
                    <div id="adminBid">₹ 0</div>
                </div>
            </div>
        </div>

        <!-- Team Selection -->
        <div class="section-card full-width">
            <div class="section-label"><i class="fa fa-shield-halved"></i> Select Team</div>
            <div id="teamContainer"></div>
        </div>

        <!-- Bid Controls -->
        <div class="section-card">
            <div class="section-label"><i class="fa fa-plus"></i> Raise Bid</div>
            <div class="bid-buttons">
                <button class="bid-btn" onclick="addBid(2000)">
                    <span class="amount">+2K</span>
                    <span class="label">₹2000</span>
                </button>
                <button class="bid-btn" onclick="addBid(5000)">
                    <span class="amount">+5K</span>
                    <span class="label">₹5000</span>
                </button>
                <button class="bid-btn" onclick="addBid(10000)">
                    <span class="amount">+10K</span>
                    <span class="label">₹10,000</span>
                </button>
            </div>
        </div>

        <!-- Player Controls -->
        <div class="section-card">
            <div class="section-label"><i class="fa fa-sliders"></i> Player Controls</div>
            <div class="action-buttons" style="grid-template-columns: repeat(3, 1fr);">
                <button class="action-btn btn-undo" onclick="undoBid()">
                    <i class="fa fa-rotate-left"></i>
                    Undo Last Bid
                </button>
                <button class="action-btn btn-undo" style="background: rgba(167, 139, 250, 0.08); border: 1px solid rgba(167, 139, 250, 0.2); color: #a78bfa;" onclick="undoResult()">
                    <i class="fa fa-rotate-left"></i>
                    Undo Result
                </button>
                <button class="action-btn btn-reset" onclick="initAuctionOrder()" title="Shuffle Only Remaining Players">
                    <i class="fa fa-random"></i>
                    Shuffle Remaining
                </button>
            </div>
        </div>

        <!-- Data Management -->
        <div class="section-card">
            <div class="section-label"><i class="fa fa-database"></i> System &amp; Data</div>
            <div class="action-buttons">
                <div style="display:none;">
                    <input type="file" id="playerFileInput" accept=".json" onchange="handleFileUpload(event, 'players')">
                    <input type="file" id="teamFileInput" accept=".json" onchange="handleFileUpload(event, 'teams')">
                </div>
                <button class="action-btn" style="background:rgba(139, 92, 246, 0.1); border:1px solid rgba(139, 92, 246, 0.3); color:#a78bfa;" onclick="document.getElementById('playerFileInput').click()">
                    <i class="fa fa-users-viewfinder"></i>
                    Upload Players
                </button>
                <button class="action-btn" style="background:rgba(6, 182, 212, 0.1); border:1px solid rgba(6, 182, 212, 0.3); color:#22d3ee;" onclick="document.getElementById('teamFileInput').click()">
                    <i class="fa fa-cloud-arrow-up"></i>
                    Upload Teams
                </button>
            </div>
        </div>

        <!-- Final Action -->
        <div class="section-card full-width">
            <div class="section-label"><i class="fa fa-gavel"></i> Final Decision</div>
            <div class="final-buttons">
                <button id="btnSold" class="final-btn btn-sold" onclick="markSold()">
                    <i class="fa fa-hammer"></i> <span>SOLD</span>
                </button>
                <button id="btnUnsold" class="final-btn btn-unsold" onclick="markUnsold()">
                    <i class="fa fa-xmark"></i> <span>UNSOLD</span>
                </button>
            </div>
        </div>

    </div>

    <script>


        async function logout() {
            if(await confirm("Are you sure you want to logout?")) {
                firebase.auth().signOut().then(() => {
                    window.location.href = "login.html";
                });
            }
        }

        // ─── Firebase Config ──────────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyBNTPXhzfkEALQ8s-1KnEiAudTz_ILRqgo",
            authDomain: "auction-orbit.firebaseapp.com",
            databaseURL: "https://auction-orbit-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "auction-orbit",
            storageBucket: "auction-orbit.firebasestorage.app",
            messagingSenderId: "464587475140",
            appId: "1:464587475140:web:5c32d7803fdeafc478e191",
            measurementId: "G-B9LFEQ71ZX"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ─── Authentication Guard ───────────────────────────────────────
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "login.html";
            }
        });

        // ─── Branded Custom Alert & Confirm ─────────────────────────────
        window.alert = function(message) {
            return showCustomModal(message, false);
        };
        window.confirm = function(message) {
            return showCustomModal(message, true);
        };

        function showCustomModal(message, isConfirm) {
            const overlay = document.createElement('div');
            overlay.className = 'custom-alert-overlay';
            overlay.innerHTML = `
                <div class="custom-alert-box">
                    <span class="custom-alert-title">Auction Orbit says</span>
                    <p class="custom-alert-msg">${message}</p>
                    <div class="custom-alert-btns">
                        ${isConfirm ? '<button class="custom-alert-btn cancel">Cancel</button>' : ''}
                        <button class="custom-alert-btn">OK</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            setTimeout(() => overlay.classList.add('show'), 10);
            
            return new Promise(resolve => {
                const btns = overlay.querySelectorAll('button');
                btns.forEach(btn => {
                    btn.onclick = () => {
                        const isOk = btn.innerText === "OK";
                        overlay.classList.remove('show');
                        setTimeout(() => {
                            document.body.removeChild(overlay);
                            resolve(isConfirm ? isOk : true);
                        }, 200);
                    };
                });
            });
        }

        let currentBid = 0;
        let bidHistory = [];
        let currentPlayer = null;
        let selectedTeamId = "";
        let selectedTeamName = "";
        let isProcessing = false;
        let teamBalances = {};
        let isAuctionStarted = false; // NEW: Global flag for start status

        let serverTimeOffset = 0;
        db.ref(".info/serverTimeOffset").on("value", (snap) => {
            serverTimeOffset = snap.val() || 0;
        });

        function getAdjustedTime() {
            return Date.now() + serverTimeOffset;
        }

        // --- Sync Started State ---
        db.ref("auctionState/isStarted").on("value", snap => {
            isAuctionStarted = !!snap.val(); // Update global flag
            const startBtn = document.getElementById("masterStartBtn");
            if (isAuctionStarted) {
                startBtn.innerHTML = '<i class="fa fa-stop"></i> <span>Stop Auction</span>';
                startBtn.style.background = "rgba(245, 158, 11, 0.1)";
                startBtn.style.border = "1px solid #f59e0b";
                startBtn.style.color = "#f59e0b";
            } else {
                startBtn.innerHTML = '<i class="fa fa-play"></i> <span>Start Auction</span>';
                startBtn.style.background = "#f59e0b";
                startBtn.style.border = "none";
                startBtn.style.color = "#000";
            }
        });

        function toggleAuctionStart() {
            db.ref("auctionState/isStarted").once("value", snap => {
                const isStarted = snap.val();
                db.ref("auctionState/isStarted").set(!isStarted);
            });
        }

        // Realtime sync for balance checking during bid increment
        db.ref("teams").on("value", snap => {
            const data = snap.val() || {};
            teamBalances = {};
            for (let t in data) {
                teamBalances[t] = data[t].purse;
            }
        });

        // --- Persistent Sync for Admin UI (Current Bid & Team) ---
        db.ref("auction").on("value", snap => {
            const data = snap.val() || {};
            currentBid = data.bid || 0;
            selectedTeamName = data.team || "";
            selectedTeamId = data.teamId || "";

            // Update Bid UI
            document.getElementById("adminBid").innerText = "₹ " + currentBid.toLocaleString('en-IN');

            // Update Team Selection UI
            document.querySelectorAll(".team").forEach(t => t.classList.remove("active"));
            if (selectedTeamId) {
                const el = document.getElementById("team-card-" + selectedTeamId);
                if (el) el.classList.add("active");
            }
        });

        db.ref("currentPlayer").on("value", (snapshot) => {
            const player = snapshot.val();
            currentPlayer = player;
            
            const nameEl = document.getElementById("currentPlayerName");
            const photoEl = document.getElementById("adminPlayerPhoto");
            const emojiEl = document.getElementById("adminEmojiPlaceholder");

            if (player) {
                nameEl.innerText = "Player: " + player.name;
                photoEl.src = player.photo || "";
                photoEl.style.display = "block";
                emojiEl.style.display = "none";
            } else {
                nameEl.innerText = "Player: –";
                photoEl.style.display = "none";
                emojiEl.style.display = "block";
            }
        });

        async function loadTeams() {
            const container = document.getElementById("teamContainer");
            container.innerHTML = ""; // Clear existing teams to prevent duplication

            // 1. Try to fetch from Firebase (Primary Source)
            const snap = await db.ref("teams").once("value");
            let teams = [];
            
            if (snap.exists()) {
                teams = Object.entries(snap.val()).map(([id, data]) => ({ id, ...data }));
            } else {
                // 2. Fallback to teams.json if DB is empty
                const res = await fetch("teams.json");
                teams = await res.json();
            }

            // Sort teams by name for easy selection
            teams.sort((a, b) => (a.name || "").localeCompare(b.name || ""));

            teams.forEach(team => {
                const div = document.createElement("div");
                div.className = "team";
                div.id = "team-card-" + team.id;
                div.innerHTML = `<img src="${team.logo}" alt="${team.name}" onerror="this.src='https://via.placeholder.com/48'"><p>${team.name}</p>`;
                div.onclick = () => selectTeam(team.id, team.name, div);
                container.appendChild(div);
            });
        }

        async function handleFileUpload(event, type) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (type === 'players') {
                        await db.ref("auctionOrder").set(data);
                        alert("Custom Player List Uploaded Successfully! ✅ Click Shuffle to start.");
                    } else {
                        // For teams, we need to format them into the object structure
                        let teamObj = {};
                        data.forEach(team => {
                            teamObj[team.id] = {
                                name: team.name,
                                logo: team.logo,
                                purse: team.purse || 200000,
                                initialPurse: team.purse || 200000,
                                players: 0,
                                buys: {}
                            };
                        });
                        await db.ref("teams").set(teamObj);
                        await loadTeams();
                        alert("Custom Team List Uploaded Successfully! ✅");
                    }
                } catch (err) {
                    alert("Error parsing JSON file. Please ensure it's a valid JSON array.");
                    console.error(err);
                }
            };
            reader.readAsText(file);
        }

        async function resetTeamsInDB() {
            // Priority: Reset based on what's ALREADY in DB (uploaded data)
            const snap = await db.ref("teams").once("value");
            let rawTeams = [];
            
            if (snap.exists()) {
                // If teams exist in DB, use their static definitions (purse/name/logo) but reset stats
                rawTeams = Object.entries(snap.val()).map(([id, data]) => ({ id, ...data }));
            } else {
                // Otherwise fallback to local file
                const res = await fetch("teams.json");
                rawTeams = await res.json();
            }

            let teamObj = {};
            rawTeams.forEach(team => {
                const initPurse = team.initialPurse || team.purse || 200000;
                teamObj[team.id] = {
                    name: team.name,
                    logo: team.logo,
                    // Use original purse from file/initial upload, default to 10M if missing
                    purse: initPurse,
                    initialPurse: initPurse,
                    players: 0,
                    buys: {}
                };
            });

            await db.ref("teams").set(teamObj);
            await loadTeams(); // Refresh the local UI list
        }

        async function initAuctionOrder() {
            // Step 1: Fetch current state
            const orderSnap = await db.ref("auctionOrder").once("value");
            const soldSnap = await db.ref("soldPlayers").once("value");
            const unsoldSnap = await db.ref("unsoldPlayers").once("value");

            let allPlayers = [];
            if (orderSnap.exists()) {
                allPlayers = Object.values(orderSnap.val());
            } else {
                const res = await fetch("players.json");
                allPlayers = await res.json();
            }

            if (!allPlayers.length) return alert("No players found.");

            // Step 2: Identify auctioned players
            const sold = soldSnap.val() || {};
            const unsold = unsoldSnap.val() || {};
            const removedIds = new Set();
            Object.values(sold).forEach(p => removedIds.add(p.id));
            Object.values(unsold).forEach(p => removedIds.add(p.id));

            // Step 3: Split into Processed vs Remaining
            const processed = allPlayers.filter(p => removedIds.has(p.id));
            const remaining = allPlayers.filter(p => !removedIds.has(p.id));

            if (remaining.length === 0) {
                return alert("No remaining players to shuffle!");
            }

            // Step 4: Shuffle only remaining
            for (let i = remaining.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
            }

            // Step 5: Reconstruct master order
            const newFullOrder = [...processed, ...remaining];
            const nextIndex = processed.length; // The first shuffled player is at this index

            // Step 6: Update Firebase (Auction results and Team purses are UNTOUCHED)
            await db.ref("auctionOrder").set(newFullOrder);
            await db.ref("auction").set({ team: "–", teamId: "", bid: 0 });
            await db.ref("lastResult").remove(); // Safety: Clear undo memory on shuffle
            await db.ref("action").remove();
            
            await db.ref("auctionState").update({
                currentIndex: nextIndex,
                isRunning: true,
                isProcessing: false
            });

            if (remaining.length > 0) {
                await db.ref("currentPlayer").set(remaining[0]);
            }

            // Clear local Admin UI State
            selectedTeamId = "";
            selectedTeamName = "";
            document.querySelectorAll(".team").forEach(t => t.classList.remove("active"));
            resetAuction();

            alert("Remaining " + remaining.length + " players shuffled successfully! 🔀");
        }

        async function restartSameOrder() {
            if (!(await confirm("Are you sure you want to RESTART with the same order? All sold data will be cleared!"))) return;
            
            // 1. Fetch current order
            const orderSnap = await db.ref("auctionOrder").once("value");
            const players = Object.values(orderSnap.val() || {});

            if (!players.length) return alert("Please shuffle first!");

            // 2. Clear results
            await db.ref("soldPlayers").remove();
            await db.ref("unsoldPlayers").remove();
            await db.ref("action").remove();
            await db.ref("lastResult").remove();
            
            // 3. Reset teams in Firebase AND UI
            await resetTeamsInDB(); 
            
            // 4. Reset state in Firebase
            await db.ref("auctionState").update({
                currentIndex: 0,
                isRunning: true,
                isProcessing: false,
                isStarted: false // Reset start state on restart
            });

            // 5. Set first player
            await db.ref("currentPlayer").set(players[0]);

            // Clear local Admin UI State completely
            selectedTeamId = "";
            selectedTeamName = "";
            document.querySelectorAll(".team").forEach(t => t.classList.remove("active"));
            resetAuction();

            alert("Auction Restarted Successfully! 🔄");
        }

        function selectTeam(id, name, element) {
            selectedTeamId = id;
            selectedTeamName = name;
            
            // Immediate Admin UI Feedback
            document.querySelectorAll(".team").forEach(t => t.classList.remove("active"));
            if (element) element.classList.add("active");

            // NOTE: We no longer sync to Firebase here. 
            // The team name will only show to the user (index.html) when a BID is actually made.
        }

        function updateScreen() {
            // Immediate Admin UI Feedback
            document.getElementById("adminBid").innerText = "₹ " + currentBid.toLocaleString('en-IN');
            
            // Sync to Firebase ONLY if a bid has been made
            // This hides the 'Selected' team from the public until the first bid occurs
            if (currentBid > 0) {
                db.ref("auction").update({ 
                    team: selectedTeamName, 
                    teamId: selectedTeamId,
                    bid: currentBid 
                });
            } else {
                // If bid is 0 (initial or after undo), reset public view to blank
                db.ref("auction").update({ 
                    team: "–", 
                    teamId: "", 
                    bid: 0 
                });
            }
        }

        function resetAuction() {
            db.ref("auction").set({ team: "–", teamId: "", bid: 0 });
            currentBid = 0;
            bidHistory = [];
            window.lastBidTeamId = "";
            window.lastBidTeamName = "";
            document.getElementById("adminBid").innerText = "₹ 0";
            document.querySelectorAll(".team").forEach(t => t.classList.remove("active"));
            selectedTeamId = "";
            selectedTeamName = "";
        }

        function addBid(amount) {
            if (!isAuctionStarted) return alert("Auction is currently STOPPED. Click 'Start Auction' first! ⏸");
            if (!selectedTeamId) return alert("Please select a team first.");
            
            const remainingPurse = teamBalances[selectedTeamId];
            if (remainingPurse !== undefined && (currentBid + amount) > remainingPurse) {
                alert("Not enough purse ❌. Maximum bid for " + selectedTeamName + " is ₹ " + remainingPurse.toLocaleString('en-IN'));
                return;
            }

            // Save the exact state BEFORE the new bid happens
            bidHistory.push({
                bid: currentBid,
                teamId: window.lastBidTeamId || selectedTeamId,
                teamName: window.lastBidTeamName || selectedTeamName
            });

            currentBid += amount;
            window.lastBidTeamId = selectedTeamId;
            window.lastBidTeamName = selectedTeamName;
            
            updateScreen();
        }

        function undoBid() {
            if (!isAuctionStarted) return alert("Auction is currently STOPPED. ⏸");
            if (bidHistory.length === 0) return;
            const last = bidHistory.pop();
            
            currentBid = last.bid;
            window.lastBidTeamId = last.teamId;
            window.lastBidTeamName = last.teamName;

            // Restore selection visually and internally
            if (last.teamId) {
                const el = document.getElementById("team-card-" + last.teamId);
                if (el) selectTeam(last.teamId, last.teamName, el);
            } else {
                document.querySelectorAll(".team").forEach(t => t.classList.remove("active"));
                selectedTeamId = "";
                selectedTeamName = "";
            }

            updateScreen();
        }

        function markSold() {
            if (!isAuctionStarted) return alert("Auction is currently STOPPED. ⏸");
            if (isProcessing) return; 
            
            const teamId = selectedTeamId;
            const teamName = selectedTeamName;
            if (!currentPlayer || !teamId) {
                alert("Please select a team first!");
                return;
            }

            if (currentBid <= 0) {
                alert("Bid amount cannot be ₹ 0!");
                return;
            }

            // UI Feedback
            isProcessing = true;
            const btnSold = document.getElementById("btnSold");
            const btnUnsold = document.getElementById("btnUnsold");
            btnSold.disabled = true;
            btnSold.querySelector('span').innerText = "Processing...";
            btnUnsold.disabled = true;

            // Use TRANSACTION for Atomic Purse Update
            db.ref("teams/" + teamId).transaction((teamData) => {
                if (teamData) {
                    if (currentBid > teamData.purse) {
                        return; // Abort if insufficient funds
                    }
                    // Update team data locally within transaction
                    teamData.purse = teamData.purse - currentBid;
                    teamData.players = (teamData.players || 0) + 1;
                    if (!teamData.buys) teamData.buys = {};
                    teamData.buys[currentPlayer.id] = {
                        id: currentPlayer.id,
                        name: currentPlayer.name,
                        role: currentPlayer.role,
                        price: currentBid,
                        photo: currentPlayer.photo,
                        city: currentPlayer.city || "",
                        bat: currentPlayer.bat || "",
                        bowl: currentPlayer.bowl || ""
                    };
                }
                return teamData;
            }, (error, committed, snapshot) => {
                if (error) {
                    alert("Transaction failed! ❌");
                    resetProcessingUI();
                } else if (!committed) {
                    alert("Insufficient Purse Balance! ❌");
                    resetProcessingUI();
                } else {
                    // Success! Now update shared state
                    const playerData = {
                        id: currentPlayer.id,
                        name: currentPlayer.name,
                        role: currentPlayer.role,
                        price: currentBid,
                        photo: currentPlayer.photo,
                        team: teamName,
                        city: currentPlayer.city || ""
                    };

                    const soldRef = db.ref("soldPlayers").push();
                    const soldKey = soldRef.key;
                    soldRef.set(playerData);

                    // Track this for Undo
                    db.ref("lastResult").set({
                        type: "sold",
                        player: currentPlayer,
                        teamId: teamId,
                        teamName: teamName,
                        price: currentBid,
                        dbKey: soldKey,
                        time: getAdjustedTime()
                    });

                    db.ref("action").set({
                        type: "sold",
                        player: currentPlayer,
                        team: teamName,
                        price: currentBid,
                        time: getAdjustedTime()
                    });

                    resetAuction();
                    
                    // Transition to next player (6s delay to allow SOLD screen to show)
                    setTimeout(() => {
                        db.ref("action").set(null); // Clear the result popup
                        nextPlayer();
                        resetProcessingUI();
                    }, 6000);
                }
            });
        }

        async function undoResult() {
            if (!isAuctionStarted) return alert("Auction is currently STOPPED. ⏸");
            if (isProcessing) return;

            const snap = await db.ref("lastResult").once("value");
            const last = snap.val();
            if (!last) return alert("No result to undo.");

            if (!(await confirm(`Undo result for ${last.player.name}?`))) return;

            isProcessing = true;

            if (last.type === "sold") {
                // 1. Refund Team Purse via Transaction
                await db.ref("teams/" + last.teamId).transaction(teamData => {
                    if (teamData) {
                        teamData.purse = (teamData.purse || 0) + last.price;
                        teamData.players = Math.max(0, (teamData.players || 0) - 1);
                        if (teamData.buys) delete teamData.buys[last.player.id];
                    }
                    return teamData;
                });
                // 2. Remove from soldPlayers
                await db.ref("soldPlayers/" + last.dbKey).remove();
            } else {
                // Remove from unsoldPlayers
                await db.ref("unsoldPlayers/" + last.dbKey).remove();
            }

            // 3. Re-set Current Player
            await db.ref("currentPlayer").set(last.player);
            
            // 4. Update index state
            const orderSnap = await db.ref("auctionOrder").once("value");
            const order = Object.values(orderSnap.val() || {});
            const idx = order.findIndex(p => p.id === last.player.id);
            if (idx !== -1) {
                await db.ref("auctionState/currentIndex").set(idx);
            }

            // 5. Clear lastResult
            await db.ref("lastResult").remove();
            await db.ref("action").remove(); // Stop any pending sold screens

            isProcessing = false;
            alert(`Result for ${last.player.name} has been undone. 🔄`);
        }

        function resetProcessingUI() {
            isProcessing = false;
            const btnSold = document.getElementById("btnSold");
            const btnUnsold = document.getElementById("btnUnsold");
            btnSold.disabled = false;
            btnSold.querySelector('span').innerText = "SOLD";
            btnUnsold.disabled = false;
            btnUnsold.querySelector('span').innerText = "UNSOLD";
        }

        function markUnsold() {
            if (!isAuctionStarted) return alert("Auction is currently STOPPED. ⏸");
            if (!currentPlayer || isProcessing) return;
            
            isProcessing = true;
            const btnSold = document.getElementById("btnSold");
            const btnUnsold = document.getElementById("btnUnsold");
            btnUnsold.disabled = true;
            btnUnsold.querySelector('span').innerText = "Processing...";
            btnSold.disabled = true;

            const playerData = {
                id: currentPlayer.id,
                name: currentPlayer.name,
                role: currentPlayer.role,
                city: currentPlayer.city || ""
            };

            const unsoldRef = db.ref("unsoldPlayers").push();
            const unsoldKey = unsoldRef.key;
            unsoldRef.set(playerData);

            // Track this for Undo
            db.ref("lastResult").set({
                type: "unsold",
                player: currentPlayer,
                dbKey: unsoldKey,
                time: getAdjustedTime()
            });

            db.ref("action").set({
                type: "unsold",
                player: currentPlayer,
                time: getAdjustedTime()
            }).then(() => {
                resetAuction();
                setTimeout(() => {
                    db.ref("action").set(null); // Clear the result popup
                    nextPlayer();
                    resetProcessingUI();
                }, 6000);
            }).catch(err => {
                alert("Update failed!");
                resetProcessingUI();
            });
        }

        async function nextPlayer() {
            try {
                const orderSnap = await db.ref("auctionOrder").once("value");
                const soldSnap = await db.ref("soldPlayers").once("value");
                const unsoldSnap = await db.ref("unsoldPlayers").once("value");

                const order = Object.values(orderSnap.val() || {});
                const sold = soldSnap.val() || {};
                const unsold = unsoldSnap.val() || {};

                if (!order.length) return;

                const removedIds = new Set();
                Object.values(sold).forEach(p => removedIds.add(p.id));
                Object.values(unsold).forEach(p => removedIds.add(p.id));

                let nextValidPlayer = null;
                let actualIndex = -1;

                // Scan entire order to find the first available player
                for (let i = 0; i < order.length; i++) {
                    let p = order[i];
                    if (p && !removedIds.has(p.id)) {
                        nextValidPlayer = p;
                        actualIndex = i;
                        break;
                    }
                }

                if (nextValidPlayer) {
                    const updates = {
                        "auctionState/currentIndex": actualIndex,
                        "auctionState/isRunning": true,
                        "currentPlayer": nextValidPlayer
                    };
                    await db.ref().update(updates);
                } else {
                    // No more players left in the master list
                    await db.ref("auctionState/isRunning").set(false);
                    await db.ref("currentPlayer").remove();
                    // Optional: Reset auction logic if needed, but usually just show end screen
                    alert("Auction Finished! All players processed.");
                }
            } catch (e) {
                console.error("Next player error:", e);
            }
        }

        async function updateRemainingCount() {
            try {
                const [orderSnap, soldSnap, unsoldSnap] = await Promise.all([
                    db.ref("auctionOrder").once("value"),
                    db.ref("soldPlayers").once("value"),
                    db.ref("unsoldPlayers").once("value")
                ]);
                const order = orderSnap.val() || [];
                const total = Array.isArray(order) ? order.length : Object.keys(order).length;
                const sold = Object.keys(soldSnap.val() || {}).length;
                const unsold = Object.keys(unsoldSnap.val() || {}).length;
                const remaining = total - (sold + unsold);
                document.getElementById("remainingCount").innerText = remaining;
            } catch (e) { console.error("Count Error:", e); }
        }

        // Hook into relevant updates
        db.ref("soldPlayers").on("value", updateRemainingCount);
        db.ref("unsoldPlayers").on("value", updateRemainingCount);
        db.ref("auctionOrder").on("value", updateRemainingCount);
        db.ref("action").on("value", handleActionUpdate); // NEW: Listen for result popup

        function handleActionUpdate(snap) {
            const action = snap.val();
            const overlay = document.getElementById("sold");
            if (!action) {
                overlay.style.display = "none";
                return;
            }
            
            // Re-sync: Only proceed if this is a valid action result
            if (action.type === "sold" || action.type === "unsold") {
                showResult(action);
            }
        }

        function showResult(action) {
            const overlay = document.getElementById("sold");
            const text = document.getElementById("resultText");
            overlay.style.display = "flex";

            if (action.type === "sold") {
                text.innerHTML = `
                    <div style="font-size:24px;">🔨</div>
                    <div style="font-size:20px; font-weight:900; color:#22c55e;">SOLD</div>
                    <div style="font-size:12px; color:#fff; margin-top:2px;">${action.team}</div>
                `;
            } else {
                text.innerHTML = `
                    <div style="font-size:24px;">❌</div>
                    <div style="font-size:20px; font-weight:900; color:#ef4444;">UNSOLD</div>
                    <div style="font-size:12px; color:#fff; margin-top:2px;">${action.player.name}</div>
                `;
            }
        }

        loadTeams();
        updateRemainingCount();
    </script>

</body>
